services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: wordgame
      POSTGRES_USER: mainuser
      POSTGRES_PASSWORD: ${QUARKUS_DATASOURCE_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mainuser -d wordgame"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    ports:
      - "${QUARKUS_HTTP_PORT:-8081}:8081"
    environment:
      QUARKUS_PROFILE: prod
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/wordgame
      QUARKUS_DATASOURCE_USERNAME: mainuser
      QUARKUS_DATASOURCE_PASSWORD: ${QUARKUS_DATASOURCE_PASSWORD:-change-me}
      QUARKUS_HTTP_PORT: 8081
      OIDC_AUTH_SERVER_URL: ${OIDC_AUTH_SERVER_URL}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-wordgamebff}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_TOKEN_AUDIENCE: ${OIDC_TOKEN_AUDIENCE:-resource_server}
      BFF_CLIENT_ID: ${BFF_CLIENT_ID:-wordgamebff}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/q/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
