quarkus.rest.jackson.optimization.enable-reflection-free-serializers=true

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/wordgame}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:mainuser}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:}
quarkus.datasource.jdbc.additional-jdbc-properties.currentSchema=${app.db.schema}
quarkus.flyway.migrate-at-start=true
quarkus.flyway.schemas=${app.db.schema}
quarkus.flyway.create-schemas=true
app.db.schema=wrdgm
quarkus.hibernate-orm.database.default-schema=${app.db.schema}
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.http.port=${QUARKUS_HTTP_PORT:8081}

quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL}
# Introspection client — validates opaque BFF service tokens (wordgamebff client_credentials)
quarkus.oidc.client-id=${OIDC_CLIENT_ID:wordgamebff}
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET}
quarkus.oidc.application-type=service
quarkus.oidc.token.audience=${OIDC_TOKEN_AUDIENCE:resource_server}

# Trusted BFF delegation (PoW users proxied via WordGameWrap)
app.bff.client-id=${BFF_CLIENT_ID:wordgamebff}
app.bff.delegated-user-header=X-Delegated-User-Id

# CORS for direct browser clients
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000}
quarkus.http.cors.methods=GET,POST,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,X-Delegated-User-Id,Idempotency-Key

# Security headers
quarkus.http.header."X-Content-Type-Options".value=nosniff
quarkus.http.header."X-Frame-Options".value=DENY
quarkus.http.header."Referrer-Policy".value=no-referrer
quarkus.http.header."Permissions-Policy".value=geolocation=()

# Health checks (liveness/readiness for container orchestration)
quarkus.smallrye-health.root-path=/q/health

# Metrics
quarkus.micrometer.export.prometheus.path=/q/metrics

# OpenAPI: generate schema at build time, do not expose at runtime
mp.openapi.extensions.smallrye.info.title=Word Games API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=REST API for the impostor word game
quarkus.smallrye-openapi.store-schema-directory=target/openapi
quarkus.smallrye-openapi.enable=false
quarkus.swagger-ui.enable=false

# IP-based rate limiting (Bucket4j)
quarkus.rate-limiter.buckets.api.shared=true
quarkus.rate-limiter.buckets.api.limits[0].permitted-uses=30
quarkus.rate-limiter.buckets.api.limits[0].period=10S
quarkus.rate-limiter.buckets.api.limits[1].permitted-uses=200
quarkus.rate-limiter.buckets.api.limits[1].period=1M
quarkus.rate-limiter.buckets.api.identity-resolver=io.quarkiverse.bucket4j.runtime.resolver.IpResolver
quarkus.rate-limiter.buckets.api-user.shared=true
quarkus.rate-limiter.buckets.api-user.limits[0].permitted-uses=60
quarkus.rate-limiter.buckets.api-user.limits[0].period=10S
quarkus.rate-limiter.buckets.api-user.limits[1].permitted-uses=500
quarkus.rate-limiter.buckets.api-user.limits[1].period=1M
quarkus.rate-limiter.buckets.api-user.identity-resolver=org.learning.games.infra.PrincipalIdentityResolver
app.rate-limit.enabled=true
app.rate-limit.per-user.enabled=false

# Endpoint protection: all routes require auth except health
quarkus.http.auth.permission.health.paths=/q/health,/q/health/*
quarkus.http.auth.permission.health.policy=permit

quarkus.http.auth.permission.authenticated.paths=/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# Scheduled data cleanup
quarkus.scheduler.enabled=true
app.cleanup.enabled=${APP_CLEANUP_ENABLED:true}
app.cleanup.dry-run=${APP_CLEANUP_DRY_RUN:false}
app.cleanup.cron=0 0 3 * * ?
app.cleanup.batch-size=500
app.cleanup.max-batches-per-run=100
app.cleanup.inter-batch-sleep-ms=50
app.cleanup.idempotency.retention-days=15
app.cleanup.game.waiting-retention-days=7
app.cleanup.game.finished-retention-days=30
%test.app.cleanup.enabled=false
%dev.app.cleanup.enabled=false

# Production profile
%prod.quarkus.hibernate-orm.schema-management.strategy=validate
%prod.quarkus.log.level=INFO
%prod.quarkus.http.access-log.enabled=true
